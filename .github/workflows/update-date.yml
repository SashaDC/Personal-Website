name: Update Last Updated Date

on:
  push:
    branches:
      - main

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update last updated date
        run: |
          DATE=$(date +'%d/%m/%Y')
          sed -i "s/const lastUpdated = \".*\"/const lastUpdated = \"$DATE\"/" client/pages/Home.tsx

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore: update last updated date" || echo "No changes to commit"
          git push
